<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我要去哪兒？ (社區篇)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 10px; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 900,  
        height: 600  
    },
    backgroundColor: '#87CEEB',
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create }
};

const game = new Phaser.Game(config);

let locations = [
    { key: 'park', text: '公園', x: 180, y: 180 },
    { key: 'restaurant', text: '餐廳', x: 450, y: 180 },
    { key: 'clothes_shop', text: '服裝店', x: 720, y: 180 },
    { key: 'library', text: '圖書館', x: 300, y: 450 },
    { key: 'hospital', text: '醫院', x: 600, y: 450 }
];

let character, currentTarget, lastTargetKey, trialCount = 0;
let scoreText, startScreen, gameStarted = false;
let locationsAsked = new Set(); 

const CHAR_WIDTH = 100;
const CHAR_HEIGHT = 144;

function preload() {
    // Show a "Loading" text for desktop stability
    let loadingText = this.add.text(450, 300, 'Loading...', { fontSize: '32px', fill: '#FFF' }).setOrigin(0.5);

    this.load.image('bg', 'assets/community_bg.jpg'); 
    this.load.image('character', 'assets/student.png');

    locations.forEach(loc => {
        this.load.image(loc.key, `assets/${loc.key}.jpg`);
        // We use the same key for audio for mobile simplicity
        this.load.audio(loc.key, `assets/${loc.key}.mp3`);
    });

    this.load.audio('correct', 'assets/correct.mp3');
    this.load.audio('wrong', 'assets/wrong.mp3');
    this.load.audio('congrats', 'assets/congrats.mp3');

    this.load.on('complete', () => { loadingText.destroy(); });
}

function create() {
    // Ensure background exists before scaling
    if (this.textures.exists('bg')) {
        let background = this.add.image(450, 300, 'bg');
        let scale = Math.max(900 / background.width, 600 / background.height);
        background.setScale(scale).setAlpha(0.4);
    }
    
    locations.forEach(loc => {
        let container = this.add.container(loc.x, loc.y);
        let cardBase = this.add.rectangle(0, 0, 240, 220, 0xffffff).setStrokeStyle(6, 0xFFA500);
        
        if (this.textures.exists(loc.key)) {
            let img = this.add.image(0, -20, loc.key).setDisplaySize(220, 160);
            container.add(img);
        }

        let txt = this.add.text(0, 85, loc.text, { 
            fontSize: '24px', color: '#555', fontWeight: 'bold', fontFamily: 'Microsoft JhengHei'
        }).setOrigin(0.5);
        
        container.add([cardBase, txt]);
        container.setSize(240, 220).setInteractive();
    });

    character = this.add.image(450, 320, 'character').setDepth(10).setVisible(false);
    character.displayWidth = CHAR_WIDTH;
    character.displayHeight = CHAR_HEIGHT;
    
    character.setData('startX', 450);
    character.setData('startY', 320);

    scoreText = this.add.text(450, 30, '進度: 0/10', { 
        fontSize: '28px', fill: '#000', fontWeight: 'bold', fontFamily: 'Microsoft JhengHei'
    }).setOrigin(0.5).setVisible(false).setDepth(100);

    showStartScreen(this);

    this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
        gameObject.x = dragX;
        gameObject.y = dragY;
    });

    this.input.on('dragend', (pointer, gameObject) => {
        checkDrop(this, gameObject);
    });
}

function showStartScreen(scene) {
    startScreen = scene.add.container(450, 300).setDepth(200);
    let overlay = scene.add.rectangle(0, 0, 900, 600, 0x000000, 0.85);
    let remindText = scene.add.text(0, -100, '社區情境：我要去哪兒？\n請按「開始」並打開聲音', { 
        fontSize: '32px', fill: '#fff', align: 'center', fontFamily: 'Microsoft JhengHei'
    }).setOrigin(0.5);

    let btnBG = scene.add.rectangle(0, 80, 220, 90, 0xFFA500).setInteractive().setStrokeStyle(4, 0xffffff);
    let btnText = scene.add.text(0, 80, '開始', { fontSize: '44px', fill: '#fff', fontWeight: 'bold' }).setOrigin(0.5);

    startScreen.add([overlay, remindText, btnBG, btnText]);

    btnBG.on('pointerdown', () => {
        // ESSENTIAL FOR MOBILE AUDIO
        if (scene.sound.context.state === 'suspended') {
            scene.sound.context.resume().then(() => {
                startGame(scene);
            });
        } else {
            startGame(scene);
        }
    });
}

function startGame(scene) {
    startScreen.destroy();
    gameStarted = true;
    character.setVisible(true).setInteractive();
    this.game.canvas.style.cursor = 'default';
    scene.input.setDraggable(character);
    scoreText.setVisible(true);
    startNewTrial(scene);
}

function startNewTrial(scene) {
    if (trialCount >= 10) {
        showCongratulation(scene);
        return;
    }

    character.x = character.getData('startX');
    character.y = character.getData('startY');
    character.setInteractive();

    let available = locations.filter(l => l.key !== lastTargetKey);
    if (trialCount < 5) {
        let unasked = available.filter(l => !locationsAsked.
