<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我要去哪兒？ (社區篇)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border-radius: 10px; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 900, height: 600 },
    backgroundColor: '#3498db', // Blue background so we know it's not "dead"
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create }
};

const game = new Phaser.Game(config);

let locations = [
    { key: 'park', text: '公園', x: 180, y: 180 },
    { key: 'restaurant', text: '餐廳', x: 450, y: 180 },
    { key: 'clothes_shop', text: '服裝店', x: 720, y: 180 },
    { key: 'library', text: '圖書館', x: 300, y: 450 },
    { key: 'hospital', text: '診所', x: 600, y: 450 }
];

let character, currentTarget, lastTargetKey, trialCount = 0;
let scoreText, startScreen;
let locationsAsked = new Set();

function preload() {
    // 1. Loading Text
    let txt = this.add.text(450, 300, '正在載入資源...', { fontSize: '24px', fill: '#FFF' }).setOrigin(0.5);

    // 2. ERROR CATCHER: If a file fails, print it to the screen
    this.load.on('loaderror', (file) => {
        console.error('Missing file:', file.src);
        this.add.text(10, 10 + (trialCount * 20), '找不到檔案: ' + file.src, { fontSize: '14px', fill: '#ff0000' });
        trialCount++; // Using this as a temporary line counter for errors
    });

    // 3. Load Images
    this.load.image('bg', 'assets/community_bg.jpg'); 
    this.load.image('character', 'assets/student.png');

    locations.forEach(loc => {
        this.load.image(loc.key, `assets/${loc.key}.jpg`);
        this.load.audio(loc.key, `assets/${loc.key}.mp3`);
    });

    this.load.audio('correct', 'assets/correct.mp3');
    this.load.audio('wrong', 'assets/wrong.mp3');
    this.load.audio('congrats', 'assets/congrats.mp3');

    this.load.on('complete', () => { 
        txt.destroy(); 
        trialCount = 0; // Reset counter for the actual game
    });
}

function create() {
    // Setup background (only if it loaded)
    if (this.textures.exists('bg')) {
        let bg = this.add.image(450, 300, 'bg');
        bg.setScale(Math.max(900/bg.width, 600/bg.height)).setAlpha(0.4);
    }
    
    // Create Location Cards
    locations.forEach(loc => {
        let container = this.add.container(loc.x, loc.y);
        let card = this.add.rectangle(0, 0, 240, 220, 0xffffff).setStrokeStyle(6, 0xFFA500);
        let label = this.add.text(0, 85, loc.text, { fontSize: '24px', color: '#555', fontWeight: 'bold' }).setOrigin(0.5);
        container.add([card, label]);

        if (this.textures.exists(loc.key)) {
            let img = this.add.image(0, -20, loc.key).setDisplaySize(220, 160);
            container.add(img);
        }
        container.setSize(240, 220).setInteractive();
    });

    // Character
    character = this.add.image(450, 320, 'character').setDepth(10).setVisible(false);
    character.setDisplaySize(100, 144);
    character.setData('startX', 450);
    character.setData('startY', 320);

    scoreText = this.add.text(450, 30, '進度: 0/10', { fontSize: '28px', fill: '#000', fontWeight: 'bold' }).setOrigin(0.5).setVisible(false);

    showStartScreen(this);

    this.input.on('drag', (p, obj, dx, dy) => { obj.x = dx; obj.y = dy; });
    this.input.on('dragend', (p, obj) => { checkDrop(this, obj); });
}

function showStartScreen(scene) {
    startScreen = scene.add.container(450, 300).setDepth(200);
    let box = scene.add.rectangle(0, 0, 900, 600, 0x000000, 0.8);
    let btn = scene.add.rectangle(0, 50, 200, 80, 0xFFA500).setInteractive();
    let btnT = scene.add.text(0, 50, '開始', { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
    startScreen.add([box, btn, btnT]);

    btn.on('pointerdown', () => {
        if (scene.sound.context.state === 'suspended') scene.sound.context.resume();
        startScreen.destroy();
        character.setVisible(true).setInteractive();
        scene.input.setDraggable(character);
        scoreText.setVisible(true);
        startNewTrial(scene);
    });
}

function startNewTrial(scene) {
    if (trialCount >= 10) { showCongratulation(scene); return; }
    character.setPosition(450, 320);
    let available = locations.filter(l => l.key !== lastTargetKey);
    currentTarget = Phaser.Utils.Array.GetRandom(available);
    lastTargetKey = currentTarget.key;
    if (scene.cache.audio.exists(currentTarget.key)) scene.sound.play(currentTarget.key);
}

function checkDrop(scene, char) {
    let dist = Phaser.Math.Distance.Between(char.x, char.y, currentTarget.x, currentTarget.y);
    if (dist < 130) {
        if (scene.cache.audio.exists('correct')) scene.sound.play('correct');
        trialCount++;
        scoreText.setText(`進度: ${trialCount}/10`);
        scene.time.delayedCall(800, () => startNewTrial(scene));
    } else {
        if (scene.cache.audio.exists('wrong')) scene.sound.play('wrong');
        char.setPosition(450, 320);
    }
}

function showCongratulation(scene) {
    if (scene.cache.audio.exists('congrats')) scene.sound.play('congrats');
    scene.add.rectangle(450, 300, 900, 600, 0x000000, 0.8).setDepth(150);
    scene.add.text(450, 300, '真棒！', { fontSize: '60px', fill: '#FFF' }).setOrigin(0.5).setDepth(151);
}
</script>
</body>
</html>
